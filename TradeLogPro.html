// LIVE PRICES
function usePrices(symbols,apiKey){
  const[prices,setPrices]=useState({});
  useEffect(()=>{
    if(!apiKey||!symbols.length)return;
    let alive=true;
    const run=async()=>{const r={};for(const sym of symbols.slice(0,10)){try{const res=await fetch(`https://finnhub.io/api/v1/quote?symbol=${sym}&token=${apiKey}`);const d=await res.json();if(d.c)r[sym]={price:d.c,changePct:d.dp,high:d.h,low:d.l};}catch(_){}await new Promise(r=>setTimeout(r,200));}if(alive)setPrices(r);};
    run();const iv=setInterval(run,30000);return()=>{alive=false;clearInterval(iv);};
  },[symbols.join(","),apiKey]);
  return prices;
}

function RiskCalc({initAccount=5000}){
  const[acc,setAcc]=useState(initAccount);const[rPct,setRPct]=useState(2);const[entry,setEntry]=useState("");const[stop,setStop]=useState("");const[side,setSide]=useState("Long");

  const tgt1=entry&&stop?(side==="Long"?parseFloat(entry)+slPts*1.5:parseFloat(entry)-slPts*1.5).toFixed(2):"—";
  const tgt2=entry&&stop?(side==="Long"?parseFloat(entry)+slPts*2.5:parseFloat(entry)-slPts*2.5).toFixed(2):"—";

}

  },[list]);

  if(preview)return<div style={{display:"flex",flexDirection:"column",gap:14}}><div style={{padding:"10px 16px",background:G.green+"18",border:`1px solid ${G.green}44`,borderRadius:8,color:G.green,fontSize:13,fontWeight:700}}>✓ Found {preview.length} trades</div><div style={{maxHeight:300,overflowY:"auto",border:`1px solid ${G.border}`,borderRadius:10}}><table style={{width:"100%",borderCollapse:"collapse"}}><thead><tr style={{borderBottom:`1px solid ${G.border}`,background:G.panel}}>{["Date","Symbol","Side","Entry","Exit","Qty"].map(h=><th key={h} style={{padding:"8px 12px",textAlign:"left",fontSize:10,color:G.muted,fontWeight:700,textTransform:"uppercase"}}>{h}</th>)}</tr></thead><tbody>{preview.map((t,i)=><tr key={i} style={{borderBottom:`1px solid ${G.border}`}}><td style={{padding:"8px 12px",fontSize:11,fontFamily:"monospace",color:G.muted}}>{t.date}</td><td style={{padding:"8px 12px",fontWeight:700,color:G.accent}}>{t.symbol}</td><td style={{padding:"8px 12px"}}><Badge label={t.side} color={t.side==="Long"?G.green:G.red} sm/></td><td style={{padding:"8px 12px",fontFamily:"monospace"}}>${t.entry}</td><td style={{padding:"8px 12px",fontFamily:"monospace"}}>${t.exit}</td><td style={{padding:"8px 12px",fontFamily:"monospace"}}>{t.qty}</td></tr>)}</tbody></table></div><div style={{display:"flex",gap:10,justifyContent:"flex-end"}}><Btn ghost onClick={()=>setPreview(null)}>← Back</Btn><Btn color={G.green} onClick={()=>{onImport(preview);onClose();}}>Import {preview.length} Trades</Btn></div></div>;
  return<div style={{display:"flex",flexDirection:"column",gap:14}}><input type="file" ref={fileRef} accept=".csv" onChange={e=>{const file=e.target.files[0];if(file){const r=new FileReader();r.onload=ev=>setText(ev.target.result);r.readAsText(file);}}} style={{display:"none"}}/><button onClick={()=>fileRef.current.click()} style={{padding:"9px 18px",background:G.panel2,border:`1px solid ${G.border}`,borderRadius:8,color:G.text,cursor:"pointer",fontFamily:"inherit",fontSize:13}}>📂 Upload CSV</button><textarea value={text} onChange={e=>setText(e.target.value)} rows={8} placeholder={"Date,Symbol,Side,Entry,Exit,Qty\n2026-05-01,AAPL,Long,171.2,175.8,50"} style={{width:"100%",background:G.input,border:`1px solid ${G.border}`,borderRadius:10,padding:"12px 16px",color:"#7dd3fc",fontSize:12,fontFamily:"monospace",resize:"vertical",boxSizing:"border-box",outline:"none"}}/>{err&&<div style={{padding:"10px 14px",background:G.red+"18",border:`1px solid ${G.red}44`,borderRadius:8,color:G.red,fontSize:13}}>⚠️ {err}</div>}<div style={{display:"flex",gap:10,justifyContent:"flex-end"}}><Btn ghost onClick={onClose}>Cancel</Btn><Btn disabled={!text.trim()} onClick={parse}>Parse →</Btn></div></div>;

// STATS
function calcStats(trades){
  if(!trades.length)return null;
  const wp=trades.map(t=>({...t,P:pnl(t)}));const wins=wp.filter(t=>t.P>0),losses=wp.filter(t=>t.P<0);const net=wp.reduce((a,t)=>a+t.P,0);const wr=wins.length/trades.length*100;
  const avgW=wins.length?wins.reduce((a,t)=>a+t.P,0)/wins.length:0;const avgL=losses.length?losses.reduce((a,t)=>a+t.P,0)/losses.length:0;
  const gW=wins.reduce((a,t)=>a+t.P,0),gL=Math.abs(losses.reduce((a,t)=>a+t.P,0));const pf=gL?gW/gL:gW?Infinity:0;
  const sorted=[...wp].sort((a,b)=>a.date.localeCompare(b.date));let eq=0;const equity=sorted.map(t=>{eq+=t.P;return{date:t.date,v:+eq.toFixed(2)};});
  const byDay={};wp.forEach(t=>{byDay[t.date]=(byDay[t.date]||0)+t.P;});const daily=Object.entries(byDay).sort((a,b)=>a[0].localeCompare(b[0])).map(([date,v])=>({date,v:+v.toFixed(2)}));
  const bySt={};wp.forEach(t=>{if(!bySt[t.strategy])bySt[t.strategy]={name:t.strategy,P:0,n:0,w:0};bySt[t.strategy].P+=t.P;bySt[t.strategy].n++;if(t.P>0)bySt[t.strategy].w++;});
  const byStrat=Object.values(bySt).map(s=>({...s,P:+s.P.toFixed(2),wr:(s.w/s.n*100).toFixed(0)}));
  const bySec={};wp.forEach(t=>{if(!bySec[t.sector])bySec[t.sector]={name:t.sector,P:0,n:0};bySec[t.sector].P+=t.P;bySec[t.sector].n++;});
  let peak=0,dd=0;equity.forEach(p=>{if(p.v>peak)peak=p.v;const d=peak-p.v;if(d>dd)dd=d;});
  const rVals=wp.filter(t=>t.r).map(t=>t.r);const avgR=rVals.length?rVals.reduce((a,v)=>a+v,0)/rVals.length:0;
  const clP=wp.filter(t=>t.checklist?.filter(Boolean).length===3);const clF=wp.filter(t=>t.checklist?.filter(Boolean).length<3);
  const clPassWr=clP.length?(clP.filter(t=>t.P>0).length/clP.length*100).toFixed(0):0;const clFailWr=clF.length?(clF.filter(t=>t.P>0).length/clF.length*100).toFixed(0):0;
  return{wp,wins,losses,net,wr,avgW,avgL,gW,gL,pf,equity,daily,byStrat,bySec:Object.values(bySec),dd,avgR,clPassWr,clFailWr};
}

      </div>

      {/* CONTENT */}
      <div style={{maxWidth:1440,margin:"0 auto",padding:16}}>
        {tab==="dashboard"&&<Dashboard trades={trades} fg={fg}/>}
        {tab==="trades"&&<TradesTab trades={trades} onEdit={t=>setModal(t)} onDelete={deleteTrade} onAdd={()=>setModal({_new:true})} onChart={s=>{setChart(s);}} onReview={t=>setAiTrade(t)}/>}
        {tab==="watchlist"&&<WatchlistTab watchlist={watch} onUpdate={saveWatch} apiKey={cfg.finnhubKey} onAddToJournal={openAddWithSym} onOpenChart={s=>setChart(s)}/>}
        {tab==="analytics"&&<Analytics trades={trades}/>}
        {tab==="calendar"&&<CalendarTab trades={trades}/>}
        {tab==="journal"&&<JournalTab trades={trades} onChart={s=>setChart(s)} onReview={t=>setAiTrade(t)}/>}
        {tab==="playbook"&&<Playbook playbook={play} onSave={p=>savePlay([...play,p])} onDelete={id=>savePlay(play.filter(p=>p.id!==id))} onUse={p=>{setModal({_new:true,_template:p});}}/>}
        {tab==="weekly"&&<WeeklyReview trades={trades}/>}
        {tab==="tools"&&<div style={{display:"flex",flexDirection:"column",gap:16}}><Card style={{padding:20}}><div style={{fontWeight:700,fontSize:15,color:"var(--text)",marginBottom:16}}>🧮 Position Size Calculator</div><RiskCalc initAccount={cfg.accountSize||5000}/></Card></div>}
        {tab==="settings"&&<Settings cfg={cfg} onSave={saveCfg}/>}
      </div>

      {/* MODALS */}
      {modal&&(modal._new||modal.id)&&(
        <Modal title={modal.id?"Edit Trade":"Log New Trade"} onClose={()=>setModal(null)} maxW={780}>
          <TradeForm init={modal.id?modal:(modal._template?{symbol:modal.symbol||"",strategy:modal._template.strategy,side:modal._template.side}:{symbol:modal.symbol||""})} onSave={addOrEdit} onClose={()=>setModal(null)} playbook={play}/>
        </Modal>
      )}
      {modal==="csv"&&<Modal title="📥 Import from TradingView CSV" onClose={()=>setModal(null)} wide><CSVImport onImport={importAll} onClose={()=>setModal(null)}/></Modal>}
      {modal==="pine"&&<Modal title="📌 Pine Script Export" onClose={()=>setModal(null)} wide><PineExport trades={trades} onClose={()=>setModal(null)}/></Modal>}
      {chart&&<TVChart symbol={chart} onClose={()=>setChart(null)}/>}
      {aiTrade&&<Modal title={`🤖 AI Review — ${aiTrade.symbol}`} onClose={()=>setAiTrade(null)} maxW={640}><AIReview trade={aiTrade} onClose={()=>setAiTrade(null)}/></Modal>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
