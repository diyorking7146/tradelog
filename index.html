async function stor(key, val) {

async function compressImage(dataUrl, maxW=800) {
  return new Promise(res=>{
    const img=new Image(); img.onload=()=>{
      const scale=Math.min(1,maxW/img.width);
      const c=document.createElement("canvas"); c.width=img.width*scale; c.height=img.height*scale;
      c.getContext("2d").drawImage(img,0,0,c.width,c.height);
      res(c.toDataURL("image/jpeg",0.7));
    }; img.src=dataUrl;
  });
}

// ═══════════════════════════════════════════════════════════
// LIVE PRICE HOOK (Finnhub)
// ═══════════════════════════════════════════════════════════
function usePrices(symbols, apiKey) {
  const [prices, setPrices] = useState({});
  useEffect(()=>{
    if (!apiKey||!symbols.length) return;
    let alive=true;
    const fetch_all=async()=>{
      const results={};
      for(const sym of symbols.slice(0,10)){
        try{
          const r=await fetch(`https://finnhub.io/api/v1/quote?symbol=${sym}&token=${apiKey}`);
          const d=await r.json();
          if(d.c) results[sym]={price:d.c,change:d.d,changePct:d.dp,high:d.h,low:d.l,open:d.o,prevClose:d.pc};
        }catch(_){}
        await new Promise(r=>setTimeout(r,200));
      }
      if(alive) setPrices(results);
    };
    fetch_all();
    const iv=setInterval(fetch_all,30000);
    return()=>{ alive=false; clearInterval(iv); };
  },[symbols.join(","),apiKey]);
  return prices;
}

// ═══════════════════════════════════════════════════════════
function RiskCalc({initAccount=5000}) {
  const [acc,  setAcc]  = useState(initAccount);
  const [rPct, setRPct] = useState(2);
  const [entry,setEntry]= useState("");
  const [stop, setStop] = useState("");
  const [side, setSide] = useState("Long");

  const riskDollar = acc*(rPct/100);
  const slPts  = entry&&stop ? Math.abs(parseFloat(entry)-parseFloat(stop)) : 0;
  const shares = slPts>0 ? Math.floor(riskDollar/slPts) : 0;
  const pos    = shares*parseFloat(entry||0);
  const tgt1   = entry&&stop ? (side==="Long"?parseFloat(entry)+slPts*1.5:parseFloat(entry)-slPts*1.5).toFixed(2) : "—";

        {inp("Entry Price",entry,setEntry,"150.00")}

            {s==="Long"?"▲ Long":"▼ Short"}
          </button>
        ))}
      </div>

      {entry&&stop&&slPts>0?(
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:10}}>

            {label:"Shares / Qty",value:shares,color:G.accent},
            {label:"Position Size",value:"$"+pos.toFixed(0),color:G.text},

}

// AI TRADE REVIEW
// ═══════════════════════════════════════════════════════════
async function callClaude(prompt) {
  const r=await fetch("https://api.anthropic.com/v1/messages",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({
      model:"claude-sonnet-4-20250514",
      max_tokens:1000,
      messages:[{role:"user",content:prompt}]
    })
  });
  const d=await r.json();
  return d.content?.[0]?.text||"No response";
}

function WeeklyReview({trades}) {
  const [review,setReview]=useState("");
  const [loading,setLoading]=useState(false);
  const [selWeek,setSelWeek]=useState(wk(today()));

  const weeks=[...new Set(trades.map(t=>wk(t.date)))].sort((a,b)=>b.localeCompare(a)).slice(0,8);
  const weekTrades=trades.filter(t=>wk(t.date)===selWeek);
  const weekPnl=weekTrades.reduce((a,t)=>a+pnl(t),0);
  const wins=weekTrades.filter(t=>pnl(t)>0);

  const generate=async()=>{
    if(!weekTrades.length){alert("No trades this week.");return;}
    setLoading(true);
    const prompt=`You are a trading performance coach. Write a comprehensive weekly trading review for this trader based on their ${weekTrades.length} trades.

Week of: ${selWeek}
Net P&L: ${money(weekPnl)}
Win Rate: ${wins.length}/${weekTrades.length} (${(wins.length/weekTrades.length*100).toFixed(0)}%)

Trades:
${weekTrades.map(t=>`- ${t.date} | ${t.side} ${t.symbol} | ${t.strategy} | Entry:$${t.entry} Exit:$${t.exit} | ${money(pnl(t))} | ${t.r||"?"}R | Tags:${t.tags?.join(",")||"none"} | Checklist:${t.checklist?.filter(Boolean).length||0}/3 | Notes:"${t.notes||"none"}"`).join("\n")}

Write a structured weekly review with these sections:
1. **Week Summary** (overall assessment)
2. **Best Trade** (what worked and why)
3. **Worst Trade** (what went wrong)
4. **Pattern Analysis** (recurring themes, good or bad)
5. **Focus for Next Week** (3 specific action items)

Be specific to THIS trader's actual trades. Keep it practical and actionable.`;
    const r=await callClaude(prompt);
    setReview(r);
    setLoading(false);
  };

  return (
    <div style={{display:"flex",flexDirection:"column",gap:16}}>
      <div style={{display:"flex",gap:10,alignItems:"center",flexWrap:"wrap"}}>
        <div>
          <label style={{fontSize:10,color:G.muted,fontWeight:700,display:"block",marginBottom:5}}>SELECT WEEK</label>
          <select value={selWeek} onChange={e=>{ setSelWeek(e.target.value); setReview(""); }}
            style={{background:"var(--input)",border:`1px solid ${G.border}`,borderRadius:8,padding:"8px 12px",color:G.text,fontSize:13,outline:"none"}}>
            {weeks.map(w=><option key={w} value={w}>Week of {w}</option>)}
            {!weeks.includes(selWeek)&&<option value={selWeek}>Week of {selWeek}</option>}
          </select>
        </div>
        <div style={{display:"flex",gap:14,alignItems:"flex-end",paddingBottom:2}}>
          <div><div style={{fontSize:10,color:G.muted,fontWeight:700}}>TRADES</div><div style={{fontSize:18,fontWeight:800,color:G.text}}>{weekTrades.length}</div></div>
          <div><div style={{fontSize:10,color:G.muted,fontWeight:700}}>NET P&L</div><div style={{fontSize:18,fontWeight:800,color:weekPnl>=0?G.green:G.red,fontFamily:"monospace"}}>{money(weekPnl)}</div></div>
          <div><div style={{fontSize:10,color:G.muted,fontWeight:700}}>WIN RATE</div><div style={{fontSize:18,fontWeight:800,color:wins.length/Math.max(weekTrades.length,1)>=0.5?G.green:G.red}}>{weekTrades.length?Math.round(wins.length/weekTrades.length*100):0}%</div></div>
        </div>
        <div style={{marginLeft:"auto"}}>
          <Btn onClick={generate} disabled={loading||!weekTrades.length}>
            {loading?"🤖 Generating…":"🤖 Generate AI Review"}
          </Btn>
        </div>
      </div>

      {weekTrades.length>0&&(
        <Card style={{overflow:"hidden"}}>
          <table style={{width:"100%",borderCollapse:"collapse"}}>
            <thead><tr style={{borderBottom:`1px solid ${G.border}`}}>
              {["Date","Symbol","Side","P&L","R","Strategy","Checklist"].map(h=>(
                <th key={h} style={{padding:"8px 12px",textAlign:"left",fontSize:10,color:G.muted,fontWeight:700,textTransform:"uppercase"}}>{h}</th>
              ))}
            </tr></thead>
            <tbody>
              {weekTrades.map(t=>{
                const p=pnl(t);
                return (
                  <tr key={t.id} style={{borderBottom:`1px solid ${G.border}`}}>
                    <td style={{padding:"8px 12px",fontSize:11,fontFamily:"monospace",color:G.muted}}>{t.date}</td>
                    <td style={{padding:"8px 12px",fontWeight:700,color:G.accent}}>{t.symbol}</td>
                    <td style={{padding:"8px 12px"}}><Badge label={t.side} color={t.side==="Long"?G.green:G.red} sm/></td>
                    <td style={{padding:"8px 12px",fontFamily:"monospace",fontWeight:700,color:p>=0?G.green:G.red,fontSize:12}}>{money(p)}</td>
                    <td style={{padding:"8px 12px",fontFamily:"monospace",fontSize:12,color:G.purple}}>{t.r||"—"}</td>
                    <td style={{padding:"8px 12px",fontSize:11,color:G.muted}}>{t.strategy}</td>
                    <td style={{padding:"8px 12px",fontSize:12,color:t.checklist?.filter(Boolean).length===3?G.green:G.yellow}}>{t.checklist?.filter(Boolean).length||0}/3</td>
                  </tr>
                );
              })}
            </tbody>
          </table>
        </Card>
      )}

      {review&&(
        <Card style={{padding:20}}>
          <div style={{fontSize:12,fontWeight:700,color:G.accent,marginBottom:12,display:"flex",alignItems:"center",gap:6}}>🤖 AI Weekly Review — Week of {selWeek}</div>
          <div style={{fontSize:13,color:G.text,lineHeight:1.8,whiteSpace:"pre-wrap"}}>{review}</div>
        </Card>
      )}

      {!review&&!loading&&(
        <div style={{textAlign:"center",padding:40,color:G.muted,background:G.panel2,borderRadius:12,border:`1px solid ${G.border}`}}>
          <div style={{fontSize:32,marginBottom:10}}>📆</div>
          <div style={{fontSize:14,marginBottom:6}}>Select a week and click Generate to get your AI review</div>
          <div style={{fontSize:12}}>Claude will analyze all your trades and give you personalized feedback</div>
        </div>
      )}
    </div>
  );
}

            <select value={finvizFilter.rsi} onChange={e=>setFinvizFilter(v=>({...v,rsi:e.target.value}))}
              style={{width:"100%",background:"var(--input)",border:`1px solid ${G.border}`,borderRadius:8,padding:"7px 10px",color:G.text,fontSize:12,outline:"none"}}>
              <option value="under40">RSI under 40</option>
              <option value="under60">RSI under 60</option>
              <option value="over60">RSI over 60</option>
            </select>
          </div>
        </div>
        <a href={fvUrl()} target="_blank" rel="noreferrer"
          style={{display:"inline-flex",alignItems:"center",gap:6,padding:"8px 16px",borderRadius:8,background:G.accent+"22",border:`1px solid ${G.accent}44`,color:G.accent,textDecoration:"none",fontSize:12,fontWeight:700}}>
          ↗ Open Finviz Screener with These Filters
        </a>
        <div style={{fontSize:11,color:G.muted,marginTop:8}}>Copy tickers from Finviz results and paste them above to add to your watchlist.</div>
      </Card>

      {/* Watchlist table */}
      {watchlist.length===0?(
        <div style={{textAlign:"center",padding:50,color:G.muted,background:G.panel2,borderRadius:12,border:`1px solid ${G.border}`}}>
          <div style={{fontSize:32,marginBottom:10}}>👁️</div>
          <div style={{fontSize:14}}>Your watchlist is empty — add some tickers above</div>
        </div>
      ):(
        <Card style={{overflow:"hidden"}}>
          <table style={{width:"100%",borderCollapse:"collapse"}}>
            <thead><tr style={{borderBottom:`1px solid ${G.border}`}}>
              {["Symbol","Price","Change","High","Low","Note","Actions"].map(h=>(
                <th key={h} style={{padding:"10px 14px",textAlign:"left",fontSize:10,color:G.muted,fontWeight:700,textTransform:"uppercase",letterSpacing:".08em"}}>{h}</th>
              ))}
            </tr></thead>
            <tbody>
              {watchlist.map(w=>{
                const q=prices[w.symbol];
                return (
                  <tr key={w.symbol} style={{borderBottom:`1px solid ${G.border}`}}>
                    <td style={{padding:"10px 14px"}}>
                      <div style={{display:"flex",alignItems:"center",gap:6}}>
                        <span style={{fontWeight:800,color:G.accent,fontSize:14}}>{w.symbol}</span>
                        <button onClick={()=>onOpenChart(w.symbol)} style={{background:G.accent+"18",border:`1px solid ${G.accent}33`,borderRadius:5,padding:"1px 7px",color:G.accent,cursor:"pointer",fontSize:10,fontWeight:700,fontFamily:"inherit"}}>TV</button>
                      </div>
                      <div style={{fontSize:10,color:G.muted}}>Added {w.added}</div>
                    </td>
                    <td style={{padding:"10px 14px",fontFamily:"monospace",fontWeight:700,fontSize:14,color:G.text}}>{q?`$${q.price.toFixed(2)}`:"—"}</td>
                    <td style={{padding:"10px 14px",fontFamily:"monospace",fontSize:13,color:q?(q.changePct>=0?G.green:G.red):G.muted}}>
                      {q?(q.changePct>=0?"+":"")+q.changePct.toFixed(2)+"%":"—"}
                    </td>
                    <td style={{padding:"10px 14px",fontFamily:"monospace",fontSize:12,color:G.muted}}>{q?`$${q.high.toFixed(2)}`:"—"}</td>
                    <td style={{padding:"10px 14px",fontFamily:"monospace",fontSize:12,color:G.muted}}>{q?`$${q.low.toFixed(2)}`:"—"}</td>
                    <td style={{padding:"10px 14px"}}>
                      <input value={w.note||""} onChange={e=>updateNote(w.symbol,e.target.value)} placeholder="Notes…"
                        style={{background:"var(--input)",border:`1px solid ${G.border}`,borderRadius:6,padding:"5px 9px",color:G.text,fontSize:11,fontFamily:"inherit",outline:"none",width:140}}/>
                    </td>
                    <td style={{padding:"10px 14px",whiteSpace:"nowrap"}}>
                      <button onClick={()=>onAddToJournal(w.symbol)} style={{background:G.green+"22",border:`1px solid ${G.green}44`,borderRadius:6,padding:"5px 10px",color:G.green,cursor:"pointer",fontSize:11,fontWeight:700,fontFamily:"inherit",marginRight:6}}>+ Trade</button>
                      <button onClick={()=>setDel(w.symbol)} style={{background:G.red+"18",border:`1px solid ${G.red}44`,borderRadius:6,padding:"5px 10px",color:G.red,cursor:"pointer",fontSize:11,fontWeight:700,fontFamily:"inherit"}}>🗑️</button>
                    </td>
                  </tr>
                );
              })}
            </tbody>
          </table>
        </Card>
      )}
    </div>
  );
}

// ═══════════════════════════════════════════════════════════
// TRADE FORM (with screenshot, checklist, playbook prefill)
// ═══════════════════════════════════════════════════════════
function TradeForm({init,onSave,onClose,playbook=[]}) {
  const blank={date:today(),symbol:"",side:"Long",entry:"",exit:"",qty:"",fees:"1.5",strategy:"Inside Bar",session:"Regular",sector:"Technology",tags:[],r:"",notes:"",reason:"",stopLoss:"",takeProfit:"",accountSize:"5000",checklist:[false,false,false],screenshot:null};
  const [f,setF]=useState(init?{...blank,...init,qty:init.qty??init.shares??"",r:init.r??init.rMultiple??"",checklist:init.checklist||[false,false,false]}:blank);
  const [showRisk,setShowRisk]=useState(false);
  const [showPlaybook,setShowPlaybook]=useState(false);
  const [uploading,setUploading]=useState(false);
  const fileRef=useRef();
  const set=(k,v)=>setF(p=>({...p,[k]:v}));
  const toggleTag=t=>set("tags",f.tags.includes(t)?f.tags.filter(x=>x!==t):[...f.tags,t]);

  const estPnl=f.entry&&f.exit&&f.qty?parseFloat(((f.side==="Long"?f.exit-f.entry:f.entry-f.exit)*f.qty-(f.fees||0)).toFixed(2)):null;

  const handleFile=async e=>{
    const file=e.target.files[0]; if(!file) return;
    setUploading(true);
    const reader=new FileReader();
    reader.onload=async ev=>{ const comp=await compressImage(ev.target.result); set("screenshot",comp); setUploading(false); };
    reader.readAsDataURL(file);
  };

  const useTemplate=p=>{ setF(f=>({...f,strategy:p.strategy,side:p.side,sector:p.sector||f.sector,notes:p.conditions?`Setup: ${p.name}\nConditions: ${p.conditions}\n${f.notes}`:`Setup: ${p.name}\n${f.notes}`,r:p.r_target||f.r})); setShowPlaybook(false); };

  const doSave=()=>{
    if(!f.symbol||!f.date||!f.entry||!f.exit||!f.qty){alert("Please fill Date, Symbol, Entry, Exit and Qty.");return;}
    onSave({...f,id:f.id||uid(),entry:+f.entry,exit:+f.exit,qty:+f.qty,fees:+(f.fees||0),r:+f.r||undefined,accountSize:+(f.accountSize||5000)});
  };

  const inp=(label,key,type="text",req=false)=>(
    <div>
      <label style={{fontSize:10,color:G.muted,fontWeight:700,textTransform:"uppercase",letterSpacing:".08em",display:"block",marginBottom:5}}>{label}{req&&<span style={{color:G.red}}>*</span>}</label>
      <input type={type} value={f[key]} onChange={e=>set(key,e.target.value)}
        style={{width:"100%",background:"var(--input)",border:`1px solid ${G.border}`,borderRadius:8,padding:"9px 12px",color:G.text,fontSize:13,fontFamily:"monospace",outline:"none",boxSizing:"border-box"}}/>
    </div>
  );
  const pick=(label,key,opts)=>(
    <div>
      <label style={{fontSize:10,color:G.muted,fontWeight:700,textTransform:"uppercase",letterSpacing:".08em",display:"block",marginBottom:5}}>{label}</label>
      <select value={f[key]} onChange={e=>set(key,e.target.value)}
        style={{width:"100%",background:"var(--input)",border:`1px solid ${G.border}`,borderRadius:8,padding:"9px 12px",color:G.text,fontSize:13,outline:"none"}}>
        {opts.map(o=><option key={o}>{o}</option>)}
      </select>
    </div>
  );

  const ep=+f.entry, sl=+f.stopLoss, tp=+f.takeProfit;
  const showRRBar = f.entry && f.stopLoss && f.takeProfit && sl>0 && tp>0;
  const rrRisk   = showRRBar ? Math.abs(ep-sl) : 0;
  const rrReward = showRRBar ? Math.abs(tp-ep) : 0;
  const rrRatio  = rrRisk>0 ? (rrReward/rrRisk).toFixed(2) : 0;
  const slPct    = showRRBar ? Math.abs((sl-ep)/ep*100).toFixed(2) : 0;
  const tpPct    = showRRBar ? Math.abs((tp-ep)/ep*100).toFixed(2) : 0;

  return (
    <div style={{display:"flex",flexDirection:"column",gap:16}}>
      {/* Playbook quick-use */}
      {playbook.length>0&&(
        <div>
          <button onClick={()=>setShowPlaybook(v=>!v)}
            style={{background:G.purple+"18",border:`1px solid ${G.purple}44`,borderRadius:8,padding:"7px 14px",color:G.purple,cursor:"pointer",fontSize:12,fontWeight:700,fontFamily:"inherit"}}>
            📚 {showPlaybook?"Hide Playbook":"Use a Playbook Setup"}
          </button>
          {showPlaybook&&(
            <div style={{marginTop:10,display:"flex",flexWrap:"wrap",gap:8}}>
              {playbook.map(p=>(
                <button key={p.id} onClick={()=>useTemplate(p)}
                  style={{background:G.panel2,border:`1px solid ${G.border}`,borderRadius:8,padding:"6px 14px",color:G.text,cursor:"pointer",fontSize:12,fontFamily:"inherit"}}>
                  {p.name} <span style={{color:G.muted}}>({p.strategy})</span>
                </button>
              ))}
            </div>
          )}
        </div>
      )}

      {/* P&L preview */}
      {estPnl!==null&&(
        <div style={{background:estPnl>=0?G.green+"18":G.red+"18",border:`1px solid ${estPnl>=0?G.green:G.red}44`,borderRadius:10,padding:"12px 16px",display:"flex",gap:20,flexWrap:"wrap"}}>
          <div><div style={{fontSize:10,color:G.muted,fontWeight:700}}>EST. P&L</div><div style={{fontSize:22,fontWeight:800,color:estPnl>=0?G.green:G.red,fontFamily:"monospace"}}>{money(estPnl)}</div></div>
          <div><div style={{fontSize:10,color:G.muted,fontWeight:700}}>ACCT RISK</div><div style={{fontSize:18,fontWeight:700,color:G.yellow,fontFamily:"monospace"}}>{(Math.abs(estPnl)/+(f.accountSize||5000)*100).toFixed(2)}%</div></div>
          {f.r&&<div><div style={{fontSize:10,color:G.muted,fontWeight:700}}>R-MULTIPLE</div><div style={{fontSize:18,fontWeight:700,color:G.purple,fontFamily:"monospace"}}>{+f.r}R</div></div>}
        </div>
      )}

      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:12}}>
        {inp("Date","date","date",true)}
        {inp("Symbol","symbol","text",true)}
        <div>
          <label style={{fontSize:10,color:G.muted,fontWeight:700,textTransform:"uppercase",letterSpacing:".08em",display:"block",marginBottom:5}}>Side</label>
          <div style={{display:"flex",gap:8}}>
            {["Long","Short"].map(s=>(
              <button key={s} onClick={()=>set("side",s)}
                style={{flex:1,padding:"9px",borderRadius:8,border:`1px solid ${f.side===s?(s==="Long"?G.green:G.red):G.border}`,background:f.side===s?(s==="Long"?G.green+"22":G.red+"22"):"transparent",color:f.side===s?(s==="Long"?G.green:G.red):G.muted,fontWeight:700,cursor:"pointer",fontFamily:"inherit",fontSize:13}}>
                {s==="Long"?"▲ Long":"▼ Short"}
              </button>
            ))}
          </div>
        </div>
        {inp("Entry Price","entry","number",true)}
        {inp("Exit Price","exit","number",true)}
        {inp("Qty / Shares","qty","number",true)}
        {inp("Stop Loss ($)","stopLoss","number")}
        {inp("Take Profit ($)","takeProfit","number")}
        {inp("Fees ($)","fees","number")}
        {inp("R-Multiple","r","number")}
        {inp("Account Size","accountSize","number")}
      </div>

      {/* SL/TP visual bar */}
      {showRRBar && (
          <div style={{background:G.panel2,border:`1px solid ${G.border}`,borderRadius:10,padding:"12px 16px"}}>
            <div style={{fontSize:11,fontWeight:700,color:G.text,marginBottom:10}}>📐 Risk / Reward Overview</div>
            <div style={{display:"flex",gap:20,flexWrap:"wrap",marginBottom:10}}>
              <div><div style={{fontSize:10,color:G.muted,fontWeight:700}}>STOP LOSS</div><div style={{fontSize:15,fontWeight:800,color:G.red,fontFamily:"monospace"}}>${sl} <span style={{fontSize:11,color:G.red}}>(-{slPct}%)</span></div></div>
              <div><div style={{fontSize:10,color:G.muted,fontWeight:700}}>TAKE PROFIT</div><div style={{fontSize:15,fontWeight:800,color:G.green,fontFamily:"monospace"}}>${tp} <span style={{fontSize:11,color:G.green}}>(+{tpPct}%)</span></div></div>
              <div><div style={{fontSize:10,color:G.muted,fontWeight:700}}>R:R RATIO</div><div style={{fontSize:15,fontWeight:800,color:+rrRatio>=2?G.green:+rrRatio>=1?G.yellow:G.red,fontFamily:"monospace"}}>{rrRatio}:1</div></div>
              <div><div style={{fontSize:10,color:G.muted,fontWeight:700}}>RISK $</div><div style={{fontSize:15,fontWeight:800,color:G.yellow,fontFamily:"monospace"}}>${(rrRisk*+(f.qty||0)).toFixed(2)}</div></div>
            </div>
            <div style={{position:"relative",height:8,background:G.border,borderRadius:4,overflow:"hidden"}}>
              <div style={{position:"absolute",left:0,top:0,height:"100%",width:(rrReward/(rrRisk+rrReward)*100)+"%",background:G.green,borderRadius:4}}/>
              <div style={{position:"absolute",right:0,top:0,height:"100%",width:(rrRisk/(rrRisk+rrReward)*100)+"%",background:G.red,borderRadius:"0 4px 4px 0"}}/>
            </div>
            <div style={{display:"flex",justifyContent:"space-between",marginTop:4,fontSize:10,color:G.muted}}>
              <span style={{color:G.red}}>◀ Risk ${rrRisk.toFixed(2)}</span>
              <span style={{color:G.green}}>Reward ${rrReward.toFixed(2)} ▶</span>
            </div>
          </div>
      )}

      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:12}}>
        {pick("Strategy","strategy",STRATEGIES)}
        {pick("Session","session",SESSIONS)}
        {pick("Sector","sector",SECTORS)}
      </div>

      {/* Risk calc toggle */}
      <button onClick={()=>setShowRisk(v=>!v)}
        style={{background:G.cyan+"12",border:`1px solid ${G.cyan}33`,borderRadius:8,padding:"7px 14px",color:G.cyan,cursor:"pointer",fontSize:12,fontWeight:700,fontFamily:"inherit",textAlign:"left"}}>
        🧮 {showRisk?"Hide":"Show"} Position Size Calculator
      </button>
      {showRisk&&(
        <Card2 style={{padding:16}}>
          <RiskCalc initAccount={+(f.accountSize||5000)}/>
        </Card2>
      )}

      {/* Tags */}
      <div>
        <div style={{fontSize:10,color:G.muted,fontWeight:700,textTransform:"uppercase",letterSpacing:".08em",marginBottom:8}}>Tags</div>
        <div style={{display:"flex",flexWrap:"wrap",gap:6}}>
          {ALL_TAGS.map(t=>(
            <button key={t} onClick={()=>toggleTag(t)}
              style={{padding:"5px 12px",borderRadius:20,border:`1px solid ${f.tags.includes(t)?G.accent:G.border}`,background:f.tags.includes(t)?G.accent+"22":"transparent",color:f.tags.includes(t)?G.accent:G.muted,cursor:"pointer",fontSize:12,fontWeight:600,fontFamily:"inherit"}}>
              {t}
            </button>
          ))}
        </div>
      </div>

      {/* Checklist */}
      <PreTradeChecklist checks={f.checklist} onChange={v=>set("checklist",v)}/>

      {/* Reason for trade */}
      <div>
        <div style={{fontSize:10,color:G.muted,fontWeight:700,textTransform:"uppercase",letterSpacing:".08em",marginBottom:6}}>💡 Reason for Taking This Trade</div>
        <textarea value={f.reason||""} onChange={e=>set("reason",e.target.value)} rows={2} placeholder="Why are you taking this trade? What is the catalyst or thesis?"
          style={{width:"100%",background:"var(--input)",border:`1px solid ${G.accent}44`,borderRadius:8,padding:"10px 12px",color:G.text,fontSize:13,resize:"vertical",fontFamily:"inherit",boxSizing:"border-box",outline:"none"}}/>
      </div>

      {/* Notes */}
      <div>
        <div style={{fontSize:10,color:G.muted,fontWeight:700,textTransform:"uppercase",letterSpacing:".08em",marginBottom:6}}>Notes / Post-Trade Review</div>
        <textarea value={f.notes} onChange={e=>set("notes",e.target.value)} rows={3}
          style={{width:"100%",background:"var(--input)",border:`1px solid ${G.border}`,borderRadius:8,padding:"10px 12px",color:G.text,fontSize:13,resize:"vertical",fontFamily:"inherit",boxSizing:"border-box",outline:"none"}}/>
      </div>

      {/* Screenshot */}
      <div>
        <div style={{fontSize:10,color:G.muted,fontWeight:700,textTransform:"uppercase",letterSpacing:".08em",marginBottom:8}}>Chart Screenshot</div>
        <input type="file" ref={fileRef} accept="image/*" onChange={handleFile} style={{display:"none"}}/>
        {f.screenshot?(
          <div style={{position:"relative",display:"inline-block"}}>
            <img src={f.screenshot} alt="screenshot" style={{maxWidth:"100%",maxHeight:200,borderRadius:8,border:`1px solid ${G.border}`}}/>
            <button onClick={()=>set("screenshot",null)} style={{position:"absolute",top:6,right:6,background:G.red,border:"none",borderRadius:6,padding:"3px 8px",color:"#fff",cursor:"pointer",fontSize:12,fontWeight:700}}>×</button>
          </div>
        ):(
          <button onClick={()=>fileRef.current.click()}
            style={{padding:"10px 18px",background:G.panel2,border:`2px dashed ${G.border}`,borderRadius:8,color:G.muted,cursor:"pointer",fontSize:13,fontFamily:"inherit",width:"100%"}}>
            {uploading?"Compressing…":"📸 Upload Chart Screenshot (JPEG/PNG)"}
          </button>
        )}
      </div>

      <div style={{display:"flex",gap:10,justifyContent:"flex-end"}}>
        <Btn ghost onClick={onClose}>Cancel</Btn>
        <Btn onClick={doSave}>{init?"Save Changes":"Log Trade +"}</Btn>
      </div>
    </div>
  );
}

// CSV IMPORT & PINE SCRIPT
// ═══════════════════════════════════════════════════════════
function CSVImport({onImport,onClose}) {
  const [text,setText]=useState("");
  const [preview,setPreview]=useState(null);
  const [err,setErr]=useState("");
  const fileRef=useRef();

  const parse=()=>{
    setErr("");
    const lines=text.trim().split(/\r?\n/).filter(Boolean);
    if(lines.length<2){setErr("Need at least a header row and one data row.");return;}
    const headers=lines[0].split(",").map(h=>h.trim().replace(/"/g,"").toLowerCase());
    const get=(row,...keys)=>{ for(const k of keys){ const i=headers.findIndex(h=>h.includes(k)); if(i>=0) return row[i]?.replace(/"/g,"").trim()||""; } return ""; };
    const rows=lines.slice(1).map(l=>l.split(",").map(c=>c.trim().replace(/"/g,"")));
    const trades=rows.map(row=>{
      const dateRaw=get(row,"date","time"); if(!dateRaw) return null;
      const dateStr=dateRaw.split(" ")[0].replace(/\//g,"-");
      const entry=parseFloat(get(row,"entry","open","buy","price"))||0;
      const exit=parseFloat(get(row,"exit","close","sell"))||0;
      const qty=parseFloat(get(row,"qty","contracts","shares","size","quantity"))||1;
      const sym=get(row,"symbol","ticker","instrument")||"UNKNOWN";
      const sideR=get(row,"side","type","direction").toLowerCase();
      const side=sideR.includes("short")?"Short":"Long";
      if(!entry&&!exit) return null;
      return {id:uid(),date:dateStr,symbol:sym,side,entry,exit:exit||entry,qty,fees:0,strategy:"Breakout",session:"Regular",sector:"Technology",tags:[],r:undefined,notes:"Imported from TradingView",checklist:[false,false,false],screenshot:null};
    }).filter(Boolean);
    if(!trades.length){setErr("No valid rows found.");return;}
    setPreview(trades);
  };

  if(preview) return (
    <div style={{display:"flex",flexDirection:"column",gap:14}}>
      <div style={{padding:"10px 16px",background:G.green+"18",border:`1px solid ${G.green}44`,borderRadius:8,color:G.green,fontSize:13,fontWeight:700}}>✓ Found {preview.length} trades</div>
      <div style={{maxHeight:300,overflowY:"auto",border:`1px solid ${G.border}`,borderRadius:10}}>
        <table style={{width:"100%",borderCollapse:"collapse"}}>
          <thead><tr style={{borderBottom:`1px solid ${G.border}`,background:G.panel}}>
            {["Date","Symbol","Side","Entry","Exit","Qty"].map(h=><th key={h} style={{padding:"8px 12px",textAlign:"left",fontSize:10,color:G.muted,fontWeight:700,textTransform:"uppercase"}}>{h}</th>)}
          </tr></thead>
          <tbody>{preview.map((t,i)=>(
            <tr key={i} style={{borderBottom:`1px solid ${G.border}`}}>
              <td style={{padding:"8px 12px",fontSize:11,fontFamily:"monospace",color:G.muted}}>{t.date}</td>
              <td style={{padding:"8px 12px",fontWeight:700,color:G.accent}}>{t.symbol}</td>
              <td style={{padding:"8px 12px"}}><Badge label={t.side} color={t.side==="Long"?G.green:G.red} sm/></td>
              <td style={{padding:"8px 12px",fontFamily:"monospace"}}>${t.entry}</td>
              <td style={{padding:"8px 12px",fontFamily:"monospace"}}>${t.exit}</td>
              <td style={{padding:"8px 12px",fontFamily:"monospace"}}>{t.qty}</td>
            </tr>
          ))}</tbody>
        </table>
      </div>
      <div style={{display:"flex",gap:10,justifyContent:"flex-end"}}>
        <Btn ghost onClick={()=>setPreview(null)}>← Back</Btn>
        <Btn color={G.green} onClick={()=>{onImport(preview);onClose();}}>Import {preview.length} Trades</Btn>
      </div>
    </div>
  );

  return (
    <div style={{display:"flex",flexDirection:"column",gap:14}}>
      <input type="file" ref={fileRef} accept=".csv" onChange={e=>{const f=e.target.files[0];if(f){const r=new FileReader();r.onload=ev=>setText(ev.target.result);r.readAsText(f);}}} style={{display:"none"}}/>
      <button onClick={()=>fileRef.current.click()} style={{padding:"9px 18px",background:G.panel2,border:`1px solid ${G.border}`,borderRadius:8,color:G.text,cursor:"pointer",fontFamily:"inherit",fontSize:13}}>📂 Upload CSV File</button>
      <textarea value={text} onChange={e=>setText(e.target.value)} rows={8}
        placeholder={"Paste TradingView CSV here…\n\nDate,Symbol,Side,Entry,Exit,Qty\n2026-05-01,AAPL,Long,171.2,175.8,50"}
        style={{width:"100%",background:"var(--input)",border:`1px solid ${G.border}`,borderRadius:10,padding:"12px 16px",color:"#7dd3fc",fontSize:12,fontFamily:"monospace",resize:"vertical",boxSizing:"border-box",outline:"none"}}/>
      {err&&<div style={{padding:"10px 14px",background:G.red+"18",border:`1px solid ${G.red}44`,borderRadius:8,color:G.red,fontSize:13}}>⚠️ {err}</div>}
      <div style={{display:"flex",gap:10,justifyContent:"flex-end"}}>
        <Btn ghost onClick={onClose}>Cancel</Btn>
        <Btn disabled={!text.trim()} onClick={parse}>Parse →</Btn>
      </div>
    </div>
  );
}

function PineExport({trades,onClose}) {
  const [copied,setCopied]=useState(false);
  const [sym,setSym]=useState("ALL");
  const syms=["ALL",...new Set(trades.map(t=>t.symbol))];
  const list=sym==="ALL"?trades:trades.filter(t=>t.symbol===sym);

  const script=useMemo(()=>{
    const lines=list.map(t=>{
      const p=pnl(t);
      const [y,m,d]=t.date.split("-").map(Number);
      const tag=`${t.side==="Long"?"▲":"▼"} ${t.symbol}\\n$${t.entry}→$${t.exit}\\n${p>=0?"+":""}$${Math.abs(p).toFixed(2)}`;
      const clr=p>=0?"color.lime":"color.red";
      const loc=t.side==="Long"?"low*0.997":"high*1.003";
      const sty=t.side==="Long"?"label.style_label_up":"label.style_label_down";
      return `    if year==${y} and month==${m} and dayofmonth==${d} and timeframe.isdaily\n        label.new(bar_index,${loc},"${tag}",color=${clr},textcolor=color.white,style=${sty},size=size.small)`;
    }).join("\n");
    const total=list.reduce((a,t)=>a+pnl(t),0);
    const wr=list.length?(list.filter(t=>pnl(t)>0).length/list.length*100).toFixed(0):0;
    return `//@version=5\nindicator("TradeLog Pro",overlay=true,max_labels_count=500)\n\n${lines}\n\nif barstate.islast\n    var t=table.new(position.top_right,2,3,bgcolor=color.new(color.black,30),border_color=color.gray,border_width=1)\n    table.cell(t,0,0,"TradeLog Pro",text_color=color.aqua,text_size=size.small)\n    table.cell(t,1,0,"${list.length} trades",text_color=color.white,text_size=size.small)\n    table.cell(t,0,1,"Net P&L",text_color=color.gray,text_size=size.tiny)\n    table.cell(t,1,1,"${total>=0?"+":""}$${Math.abs(total).toFixed(2)}",text_color=${total>=0?"color.lime":"color.red"},text_size=size.small)\n    table.cell(t,0,2,"Win Rate",text_color=color.gray,text_size=size.tiny)\n    table.cell(t,1,2,"${wr}%",text_color=${+wr>=50?"color.lime":"color.red"},text_size=size.small)\n`;
  },[list]);

  const copy=()=>{ navigator.clipboard.writeText(script); setCopied(true); setTimeout(()=>setCopied(false),2000); };

  return (
    <div style={{display:"flex",flexDirection:"column",gap:14}}>
      <div style={{display:"flex",gap:8,flexWrap:"wrap",alignItems:"center"}}>
        <span style={{fontSize:11,color:G.muted,fontWeight:700}}>SYMBOL:</span>
        {syms.map(s=><button key={s} onClick={()=>setSym(s)} style={{padding:"5px 10px",borderRadius:6,border:`1px solid ${sym===s?G.accent:G.border}`,background:sym===s?G.accent+"22":"transparent",color:sym===s?G.accent:G.muted,cursor:"pointer",fontSize:11,fontWeight:700,fontFamily:"inherit"}}>{s}</button>)}
        <a href="https://www.tradingview.com/chart/" target="_blank" rel="noreferrer" style={{marginLeft:"auto",padding:"7px 14px",borderRadius:8,background:G.panel2,color:G.text,textDecoration:"none",fontSize:12,fontWeight:700,border:`1px solid ${G.border}`}}>↗ TradingView</a>
        <Btn onClick={copy} color={copied?G.green:G.accent}>{copied?"✓ Copied!":"📋 Copy Script"}</Btn>
      </div>
      <pre style={{background:"#070b14",border:`1px solid ${G.border}`,borderRadius:10,padding:"14px 18px",fontSize:11,color:"#7dd3fc",fontFamily:"monospace",overflowX:"auto",overflowY:"auto",maxHeight:380,margin:0,lineHeight:1.7}}>{script}</pre>
      <div style={{fontSize:12,color:G.muted,padding:"8px 12px",background:G.panel2,borderRadius:8,border:`1px solid ${G.border}`}}>
        💡 Works on <strong style={{color:G.yellow}}>Daily timeframe</strong>. Paste into Pine Editor → Add to Chart.
      </div>
    </div>
  );
}

// ═══════════════════════════════════════════════════════════
// STATS
// ═══════════════════════════════════════════════════════════
function calcStats(trades) {
  if(!trades.length) return null;
  const wp=trades.map(t=>({...t,P:pnl(t)}));
  const wins=wp.filter(t=>t.P>0),losses=wp.filter(t=>t.P<0);
  const net=wp.reduce((a,t)=>a+t.P,0);
  const wr=wins.length/trades.length*100;
  const avgW=wins.length?wins.reduce((a,t)=>a+t.P,0)/wins.length:0;
  const avgL=losses.length?losses.reduce((a,t)=>a+t.P,0)/losses.length:0;
  const gW=wins.reduce((a,t)=>a+t.P,0),gL=Math.abs(losses.reduce((a,t)=>a+t.P,0));
  const pf=gL?gW/gL:gW?Infinity:0;
  const sorted=[...wp].sort((a,b)=>a.date.localeCompare(b.date));
  let eq=0; const equity=sorted.map(t=>{eq+=t.P;return{date:t.date,v:+eq.toFixed(2)};});
  const byDay={};
  wp.forEach(t=>{byDay[t.date]=(byDay[t.date]||0)+t.P;});
  const daily=Object.entries(byDay).sort((a,b)=>a[0].localeCompare(b[0])).map(([date,v])=>({date,v:+v.toFixed(2)}));
  const bySt={};
  wp.forEach(t=>{if(!bySt[t.strategy])bySt[t.strategy]={name:t.strategy,P:0,n:0,w:0};bySt[t.strategy].P+=t.P;bySt[t.strategy].n++;if(t.P>0)bySt[t.strategy].w++;});
  const byStrat=Object.values(bySt).map(s=>({...s,P:+s.P.toFixed(2),wr:(s.w/s.n*100).toFixed(0)}));
  const bySec={};
  wp.forEach(t=>{if(!bySec[t.sector])bySec[t.sector]={name:t.sector,P:0,n:0};bySec[t.sector].P+=t.P;bySec[t.sector].n++;});
  let peak=0,dd=0;equity.forEach(p=>{if(p.v>peak)peak=p.v;const d=peak-p.v;if(d>dd)dd=d;});
  const rVals=wp.filter(t=>t.r).map(t=>t.r);
  const avgR=rVals.length?rVals.reduce((a,v)=>a+v,0)/rVals.length:0;
  const clPassed=wp.filter(t=>t.checklist?.filter(Boolean).length===3);
  const clFailed=wp.filter(t=>t.checklist?.filter(Boolean).length<3);
  const clPassWr=clPassed.length?(clPassed.filter(t=>t.P>0).length/clPassed.length*100).toFixed(0):0;
  const clFailWr=clFailed.length?(clFailed.filter(t=>t.P>0).length/clFailed.length*100).toFixed(0):0;
  return{wp,wins,losses,net,wr,avgW,avgL,gW,gL,pf,equity,daily,byStrat,bySec:Object.values(bySec),dd,avgR,clPassWr,clFailWr,sorted};
}

// TRADES TAB
// ═══════════════════════════════════════════════════════════
function TradesTab({trades,onEdit,onDelete,onAdd,onChart,onReview}) {
  const [fSym,setFSym]=useState("");
  const [fSide,setFSide]=useState("All");
  const [fRes,setFRes]=useState("All");
  const [sortK,setSortK]=useState("date");
  const [sortD,setSortD]=useState(-1);
  const [exp,setExp]=useState(null);
  const [del,setDel]=useState(null);

  const rows=useMemo(()=>{
    let t=trades.map(t=>({...t,P:pnl(t)}));
    if(fSym) t=t.filter(x=>x.symbol.toLowerCase().includes(fSym.toLowerCase()));
    if(fSide!=="All") t=t.filter(x=>x.side===fSide);
    if(fRes==="Win") t=t.filter(x=>x.P>0);
    if(fRes==="Loss") t=t.filter(x=>x.P<0);
    t.sort((a,b)=>{const av=a[sortK],bv=b[sortK];return(typeof av==="string"?av.localeCompare(bv):av-bv)*sortD;});
    return t;
  },[trades,fSym,fSide,fRes,sortK,sortD]);

  const th=(label,key)=>(
    <th onClick={()=>{if(sortK===key)setSortD(d=>-d);else{setSortK(key);setSortD(-1);}}}
      style={{padding:"9px 12px",textAlign:"left",fontSize:10,color:G.muted,fontWeight:700,textTransform:"uppercase",letterSpacing:".08em",cursor:"pointer",whiteSpace:"nowrap",userSelect:"none",borderBottom:`1px solid ${G.border}`}}>
      {label}{sortK===key?(sortD>0?" ↑":" ↓"):""}
    </th>
  );

  const expanded=rows.find(t=>t.id===exp);

  return (
    <div style={{display:"flex",flexDirection:"column",gap:12}}>
      {del&&<Confirm text={`Delete ${del.side} ${del.symbol} ${del.date} — ${money(del.P)}?`} onOk={()=>{onDelete(del.id);setDel(null);if(exp===del.id)setExp(null);}} onCancel={()=>setDel(null)}/>}

      <Card style={{padding:"12px 14px"}}>
        <div style={{display:"flex",gap:8,flexWrap:"wrap",alignItems:"center"}}>
          <input placeholder="Symbol…" value={fSym} onChange={e=>setFSym(e.target.value.toUpperCase())}
            style={{background:"var(--input)",border:`1px solid ${G.border}`,borderRadius:8,padding:"7px 12px",color:G.text,fontSize:13,outline:"none",width:110,fontFamily:"monospace"}}/>
          {["All","Long","Short"].map(s=><button key={s} onClick={()=>setFSide(s)} style={{padding:"7px 12px",borderRadius:8,border:`1px solid ${fSide===s?G.accent:G.border}`,background:fSide===s?G.accent+"22":"transparent",color:fSide===s?G.accent:G.muted,cursor:"pointer",fontSize:12,fontWeight:700,fontFamily:"inherit"}}>{s}</button>)}
          {["All","Win","Loss"].map(r=><button key={r} onClick={()=>setFRes(r)} style={{padding:"7px 12px",borderRadius:8,border:`1px solid ${fRes===r?(r==="Win"?G.green:r==="Loss"?G.red:G.accent):G.border}`,background:fRes===r?(r==="Win"?G.green:r==="Loss"?G.red:G.accent)+"22":"transparent",color:fRes===r?(r==="Win"?G.green:r==="Loss"?G.red:G.accent):G.muted,cursor:"pointer",fontSize:12,fontWeight:700,fontFamily:"inherit"}}>{r}</button>)}
          <span style={{fontSize:12,color:G.muted,marginLeft:"auto"}}>{rows.length} trades · <span style={{color:rows.reduce((a,t)=>a+t.P,0)>=0?G.green:G.red,fontWeight:700}}>{money(rows.reduce((a,t)=>a+t.P,0))}</span></span>
          <Btn sm onClick={onAdd}>+ Log Trade</Btn>
        </div>
      </Card>

      <Card style={{overflow:"hidden"}}>
        <div style={{overflowX:"auto"}}>
          <table style={{width:"100%",borderCollapse:"collapse"}}>
            <thead><tr>
              {th("Date","date")}{th("Symbol","symbol")}{th("Side","side")}
              {th("Entry","entry")}{th("Exit","exit")}{th("Qty","qty")}
              {th("P&L","P")}{th("R","r")}{th("SL","stopLoss")}{th("TP","takeProfit")}{th("Strategy","strategy")}
              <th style={{padding:"9px 12px",textAlign:"center",fontSize:10,color:G.muted,fontWeight:700,textTransform:"uppercase",borderBottom:`1px solid ${G.border}`,whiteSpace:"nowrap"}}>CL</th>
              <th style={{padding:"9px 12px",textAlign:"center",fontSize:10,color:G.muted,fontWeight:700,textTransform:"uppercase",borderBottom:`1px solid ${G.border}`,whiteSpace:"nowrap"}}>Actions</th>
            </tr></thead>
            <tbody>
              {rows.map(t=>(
                <tr key={t.id} onClick={()=>setExp(exp===t.id?null:t.id)}
                  style={{borderBottom:`1px solid ${G.border}`,cursor:"pointer",background:exp===t.id?G.accent+"09":"transparent",transition:"background .15s"}}>
                  <td style={{padding:"10px 12px",fontSize:11,fontFamily:"monospace",color:G.muted}}>{t.date}</td>
                  <td style={{padding:"10px 12px"}}>
                    <div style={{display:"flex",alignItems:"center",gap:5}}>
                      <span style={{fontWeight:800,color:G.accent,fontSize:14}}>{t.symbol}</span>
                      <button onClick={e=>{e.stopPropagation();onChart(t.symbol)}} style={{background:G.accent+"22",border:`1px solid ${G.accent}44`,borderRadius:5,padding:"1px 6px",color:G.accent,cursor:"pointer",fontSize:9,fontWeight:700,fontFamily:"inherit"}}>TV</button>
                    </div>
                  </td>
                  <td style={{padding:"10px 12px"}}><Badge label={t.side} color={t.side==="Long"?G.green:G.red} sm/></td>
                  <td style={{padding:"10px 12px",fontFamily:"monospace",fontSize:12}}>${t.entry}</td>
                  <td style={{padding:"10px 12px",fontFamily:"monospace",fontSize:12}}>${t.exit}</td>
                  <td style={{padding:"10px 12px",fontFamily:"monospace",fontSize:12}}>{t.qty}</td>

                  <td style={{padding:"10px 12px",fontFamily:"monospace",fontSize:12,color:G.red}}>{t.stopLoss?"$"+t.stopLoss:"—"}</td>
                  <td style={{padding:"10px 12px",fontFamily:"monospace",fontSize:12,color:G.green}}>{t.takeProfit?"$"+t.takeProfit:"—"}</td>
                  <td style={{padding:"10px 12px",fontSize:11,color:G.muted}}>{t.strategy}</td>
                  <td style={{padding:"10px 12px",textAlign:"center",fontSize:12,color:t.checklist?.filter(Boolean).length===3?G.green:G.yellow}}>{t.checklist?.filter(Boolean).length||0}/3</td>
                  <td style={{padding:"10px 12px",textAlign:"center",whiteSpace:"nowrap"}}>
                    <button onClick={e=>{e.stopPropagation();onEdit(t)}} style={{background:"transparent",border:`1px solid ${G.border}`,borderRadius:6,padding:"4px 10px",color:G.muted,cursor:"pointer",fontSize:11,fontWeight:700,fontFamily:"inherit",marginRight:4}}>✏️</button>
                    <button onClick={e=>{e.stopPropagation();onReview(t)}} style={{background:G.purple+"18",border:`1px solid ${G.purple}44`,borderRadius:6,padding:"4px 10px",color:G.purple,cursor:"pointer",fontSize:11,fontWeight:700,fontFamily:"inherit",marginRight:4}}>🤖</button>
                    <button onClick={e=>{e.stopPropagation();setDel(t)}} style={{background:G.red+"18",border:`1px solid ${G.red}44`,borderRadius:6,padding:"4px 10px",color:G.red,cursor:"pointer",fontSize:11,fontWeight:700,fontFamily:"inherit"}}>🗑️</button>
                  </td>
                </tr>
              ))}
            </tbody>
          </table>
          {rows.length===0&&<div style={{textAlign:"center",padding:48,color:G.muted,fontSize:14}}>No trades match your filters.</div>}
        </div>
      </Card>

      {expanded&&(
        <Card style={{padding:18}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:12}}>
            <div style={{display:"flex",gap:10,alignItems:"center",flexWrap:"wrap"}}>

// CALENDAR
// ═══════════════════════════════════════════════════════════
function CalendarTab({trades}) {
  const now=new Date();
  const [yr,setYr]=useState(now.getFullYear());
  const [mo,setMo]=useState(now.getMonth());
  const [sel,setSel]=useState(null);
  const map=useMemo(()=>{
    const m={};
    trades.forEach(t=>{const p=pnl(t);if(!m[t.date])m[t.date]={P:0,n:0,list:[]};m[t.date].P+=p;m[t.date].n++;m[t.date].list.push({...t,P:p});});
    return m;
  },[trades]);
  const dim=new Date(yr,mo+1,0).getDate(),fd=new Date(yr,mo,1).getDay();
  const weeks=[];let wk2=Array(fd).fill(null);
  for(let d=1;d<=dim;d++){wk2.push(d);if(wk2.length===7){weeks.push(wk2);wk2=[];}}
  if(wk2.length) weeks.push([...wk2,...Array(7-wk2.length).fill(null)]);
  const mStr=`${yr}-${String(mo+1).padStart(2,"0")}`;
  const mPnl=Object.entries(map).filter(([k])=>k.startsWith(mStr)).reduce((a,[,v])=>a+v.P,0);
  const todayStr=now.toISOString().slice(0,10);
  const prev=()=>mo===0?(setYr(y=>y-1),setMo(11)):setMo(m=>m-1);
  const next=()=>mo===11?(setYr(y=>y+1),setMo(0)):setMo(m=>m+1);
  return (
    <div style={{display:"flex",flexDirection:"column",gap:14}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
        <div style={{display:"flex",gap:8,alignItems:"center"}}>
          <Btn ghost sm onClick={prev}>‹ Prev</Btn>
          <span style={{fontWeight:700,fontSize:17,color:G.text,minWidth:200,textAlign:"center"}}>{new Date(yr,mo).toLocaleString("default",{month:"long",year:"numeric"})}</span>
          <Btn ghost sm onClick={next}>Next ›</Btn>
        </div>
        <div><div style={{fontSize:10,color:G.muted,fontWeight:700}}>MONTH P&L</div><div style={{fontSize:20,fontWeight:800,fontFamily:"monospace",color:mPnl>=0?G.green:G.red}}>{money(mPnl)}</div></div>
      </div>
      <Card style={{overflow:"hidden"}}>
        <div style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)",borderBottom:`1px solid ${G.border}`}}>
          {["Sun","Mon","Tue","Wed","Thu","Fri","Sat"].map(d=><div key={d} style={{padding:"9px 0",textAlign:"center",fontSize:10,fontWeight:700,color:G.muted,textTransform:"uppercase"}}>{d}</div>)}
        </div>
        {weeks.map((wk3,wi)=>(
          <div key={wi} style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)",borderBottom:wi<weeks.length-1?`1px solid ${G.border}`:"none"}}>
            {wk3.map((day,di)=>{
              const key=day?`${yr}-${String(mo+1).padStart(2,"0")}-${String(day).padStart(2,"0")}`:null;
              const data=key?map[key]:null;
              const isT=key===todayStr,isS=key===sel;
              return (
                <div key={di} onClick={()=>day&&setSel(isS?null:key)}
                  style={{minHeight:78,padding:"8px 10px",borderRight:di<6?`1px solid ${G.border}`:"none",background:isS?G.accent+"0e":"transparent",cursor:day?"pointer":"default",transition:"background .15s"}}>
                  {day&&<>
                    <div style={{display:"flex",justifyContent:"space-between"}}>
                      <span style={{fontSize:12,fontWeight:700,color:isT?G.accent:G.text,background:isT?G.accent+"22":undefined,borderRadius:4,padding:isT?"1px 5px":undefined}}>{day}</span>
                      {data&&<span style={{fontSize:9,color:G.muted}}>{data.n}T</span>}
                    </div>
                    {data&&<><div style={{fontSize:11,fontWeight:800,color:data.P>=0?G.green:G.red,fontFamily:"monospace",marginTop:4}}>{money(data.P)}</div><div style={{marginTop:4,height:3,borderRadius:2,background:data.P>=0?G.green:G.red,opacity:.6,width:Math.min(100,Math.abs(data.P)/4)+"%",minWidth:14}}/></>}
                  </>}
                </div>
              );
            })}
          </div>
        ))}
      </Card>
      {sel&&map[sel]&&(
        <Card style={{padding:18}}>
          <div style={{fontWeight:700,fontSize:14,color:G.text,marginBottom:12}}>{new Date(sel+"T12:00:00").toLocaleDateString("default",{weekday:"long",year:"numeric",month:"long",day:"numeric"})} — {money(map[sel].P)}</div>
          <div style={{display:"flex",flexDirection:"column",gap:8}}>
            {map[sel].list.map(t=>(
              <div key={t.id} style={{display:"flex",gap:12,alignItems:"center",padding:"10px 14px",background:G.panel2,borderRadius:8,border:`1px solid ${G.border}`}}>
                <Badge label={t.side} color={t.side==="Long"?G.green:G.red} sm/>
                <span style={{fontWeight:800,color:G.accent}}>{t.symbol}</span>
                <span style={{fontSize:12,color:G.muted}}>{t.strategy}</span>
                <span style={{fontSize:12,color:G.muted,fontFamily:"monospace"}}>{t.entry}→{t.exit}×{t.qty}</span>
                <span style={{marginLeft:"auto",fontWeight:800,fontFamily:"monospace",color:t.P>=0?G.green:G.red}}>{money(t.P)}</span>
              </div>
            ))}
          </div>
        </Card>
      )}
    </div>
  );
}

              </div>
              <div style={{textAlign:"right"}}>

              {t.r&&<span>R <strong style={{color:G.purple,fontFamily:"monospace"}}>{t.r}R</strong></span>}
              <span>Sector <strong style={{color:G.text}}>{t.sector}</strong></span>
            </div>
            {t.reason&&<div style={{fontSize:13,color:G.text,padding:"8px 12px",background:G.accent+"12",borderRadius:8,borderLeft:`3px solid ${G.accent}`,marginBottom:8}}>💡 <strong>Reason:</strong> {t.reason}</div>}
            {(t.stopLoss||t.takeProfit)&&(
              <div style={{display:"flex",gap:16,marginBottom:8,padding:"8px 12px",background:G.panel2,borderRadius:8,border:`1px solid ${G.border}`}}>
                {t.stopLoss&&<div><span style={{fontSize:10,color:G.muted,fontWeight:700}}>STOP LOSS </span><span style={{fontFamily:"monospace",fontWeight:700,color:G.red}}>${t.stopLoss}</span></div>}
                {t.takeProfit&&<div><span style={{fontSize:10,color:G.muted,fontWeight:700}}>TAKE PROFIT </span><span style={{fontFamily:"monospace",fontWeight:700,color:G.green}}>${t.takeProfit}</span></div>}
                {t.stopLoss&&t.takeProfit&&<div><span style={{fontSize:10,color:G.muted,fontWeight:700}}>R:R </span><span style={{fontFamily:"monospace",fontWeight:700,color:G.yellow}}>{(Math.abs(t.takeProfit-t.entry)/Math.abs(t.stopLoss-t.entry)).toFixed(2)}:1</span></div>}
              </div>
            )}
            {t.notes&&<div style={{fontSize:13,color:G.muted,padding:"8px 12px",background:G.panel2,borderRadius:8,borderLeft:`3px solid ${G.border}`,marginBottom:8}}>📝 {t.notes}</div>}
            {t.tags?.length>0&&<div style={{display:"flex",gap:6,flexWrap:"wrap",marginBottom:t.screenshot?10:0}}>{t.tags.map(tag=><Badge key={tag} label={tag} sm/>)}</div>}

          </Card>
        );

}

    });
  },[]);

  const saveTrades  = useCallback(next=>{setTrades(next);stor(SK.trades,next);},[]);
  const saveWatch   = useCallback(next=>{setWatch(next);stor(SK.watchlist,next);},[]);
  const savePlay    = useCallback(next=>{setPlay(next);stor(SK.playbook,next);},[]);
  const saveCfg     = useCallback(next=>{setCfg(next);stor(SK.settings,next);},[]);

  const addOrEdit   = useCallback(t=>{
    saveTrades(trades.find(x=>x.id===t.id)?trades.map(x=>x.id===t.id?t:x):[...trades,t]);
    setModal(null);
  },[trades,saveTrades]);

  const deleteTrade = useCallback(id=>saveTrades(trades.filter(t=>t.id!==id)),[trades,saveTrades]);
  const importAll   = useCallback(list=>saveTrades([...trades,...list]),[trades,saveTrades]);
  const deletePlay  = useCallback(id=>savePlay(play.filter(p=>p.id!==id)),[play,savePlay]);

  const openAddWithSym = sym=>{
    setModal({_new:true,symbol:sym});
    setTab("trades");
  };

  const s=useMemo(()=>calcStats(trades),[trades]);

  if(loading) return (
    <div style={{background:"#080c14",minHeight:"100vh",display:"flex",alignItems:"center",justifyContent:"center",fontFamily:"system-ui,sans-serif"}}>
      <div style={{textAlign:"center"}}>
        <div style={{fontSize:36,marginBottom:12}}>📈</div>
        <div style={{color:"#3b82f6",fontSize:16,fontWeight:700}}>TradeLog Pro</div>
        <div style={{color:"#64748b",fontSize:12,marginTop:4}}>Loading your journal…</div>
      </div>
    </div>
  );

  const palette = theme === "dark" ? DARK : LIGHT;

  return (
    <div style={{
      ...palette,
      position:"fixed", inset:0, overflowY:"auto",
      background:"var(--bg)", fontFamily:"'Segoe UI',system-ui,sans-serif",
      color:"var(--text)", transition:"background .3s,color .25s"
    }}>
      <style>{`
        *{box-sizing:border-box}
        ::-webkit-scrollbar{width:5px;height:5px}
        ::-webkit-scrollbar-track{background:var(--scrollbar-track)}
        ::-webkit-scrollbar-thumb{background:var(--scrollbar-thumb);border-radius:3px}
        input,select,textarea{font-family:inherit;color-scheme:${theme}}
        button:focus{outline:none}
        a{transition:opacity .15s} a:hover{opacity:.8}
      `}</style>

      {/* ── HEADER ── */}
      <div style={{background:G.panel,borderBottom:`1px solid ${G.border}`,position:"sticky",top:0,zIndex:200}}>
        <div style={{maxWidth:1440,margin:"0 auto",padding:"0 16px"}}>
          <div style={{display:"flex",alignItems:"center",gap:12,paddingTop:10,paddingBottom:2}}>
            {/* Logo */}
            <div style={{display:"flex",alignItems:"center",gap:8,minWidth:160}}>
              <div style={{width:32,height:32,background:`linear-gradient(135deg,${G.accent},${G.purple})`,borderRadius:8,display:"flex",alignItems:"center",justifyContent:"center",fontSize:17}}>📈</div>
              <div>
                <div style={{fontWeight:800,fontSize:15,letterSpacing:"-.02em",color:G.text}}>TradeLog Pro</div>
                <div style={{fontSize:9,color:G.muted,fontWeight:600}}>+ TradingView · Finnhub · AI</div>
              </div>
            </div>

            {/* Quick stats */}
            <div style={{display:"flex",gap:16,padding:"6px 16px",background:G.panel2,borderRadius:10,border:`1px solid ${G.border}`}}>
              {[
                {label:"P&L",value:s?money(s.net):"$0",color:s?(s.net>=0?G.green:G.red):G.muted},
                {label:"WR",value:s?s.wr.toFixed(0)+"%":"—",color:s?(s.wr>=50?G.green:G.red):G.muted},
                {label:"PF",value:s?(isFinite(s.pf)?s.pf.toFixed(1):"∞"):"—",color:s?(s.pf>=1?G.green:G.red):G.muted},
                {label:"Trades",value:trades.length,color:G.text},
              ].map(x=>(
                <div key={x.label} style={{textAlign:"center"}}>
                  <div style={{fontSize:9,color:G.muted,fontWeight:700}}>{x.label}</div>
                  <div style={{fontSize:14,fontWeight:800,color:x.color,fontFamily:"monospace"}}>{x.value}</div>
                </div>
              ))}
            </div>

            <div style={{marginLeft:"auto",display:"flex",gap:8,alignItems:"center"}}>
              {/* ── Theme Toggle ── */}
              <button onClick={()=>{ const next=theme==="dark"?"light":"dark"; setTheme(next); stor("tlp-theme",next); }}
                title={`Switch to ${theme==="dark"?"light":"dark"} mode`}
                style={{width:36,height:36,borderRadius:8,border:`1px solid ${G.border}`,background:G.panel2,cursor:"pointer",fontSize:17,display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>
                {theme==="dark"?"☀️":"🌙"}
              </button>
              <button onClick={()=>setModal("csv")} style={{padding:"7px 13px",borderRadius:8,border:`1px solid ${G.border}`,background:G.panel2,color:G.text,cursor:"pointer",fontFamily:"inherit",fontSize:12,fontWeight:700}}>📥 Import CSV</button>
              <button onClick={()=>setModal("pine")} style={{padding:"7px 13px",borderRadius:8,border:`1px solid ${G.purple}44`,background:G.purple+"18",color:G.purple,cursor:"pointer",fontFamily:"inherit",fontSize:12,fontWeight:700}}>📌 Pine Script</button>
              <button onClick={()=>setModal({_new:true})} style={{padding:"7px 18px",borderRadius:8,border:"none",background:`linear-gradient(135deg,${G.accent},${G.purple})`,color:"#fff",cursor:"pointer",fontFamily:"inherit",fontSize:13,fontWeight:800}}>+ Log Trade</button>
            </div>
          </div>
          {/* Tabs */}
          <div style={{display:"flex",overflowX:"auto",gap:0,paddingTop:4}}>
            {MAIN_TABS.map(t=>(
              <button key={t.id} onClick={()=>setTab(t.id)}
                style={{background:tab===t.id?G.accent+"18":"transparent",color:tab===t.id?G.accent:G.muted,border:"none",borderBottom:tab===t.id?`2px solid ${G.accent}`:"2px solid transparent",padding:"8px 14px",cursor:"pointer",fontWeight:600,fontSize:12,display:"flex",alignItems:"center",gap:4,fontFamily:"inherit",whiteSpace:"nowrap",transition:"all .2s"}}>
                {t.icon} {t.label}
              </button>
            ))}
          </div>
        </div>
      </div>

      {/* ── CONTENT ── */}
      <div style={{maxWidth:1440,margin:"0 auto",padding:16}}>
        {tab==="dashboard" && <Dashboard trades={trades} fg={fg} extraEvents={[]}/>}
        {tab==="trades"    && <TradesTab trades={trades} onEdit={t=>setModal(t)} onDelete={deleteTrade} onAdd={()=>setModal({_new:true})} onChart={s=>{setChart(s);}} onReview={t=>setAiTrade(t)}/>}
        {tab==="watchlist" && <WatchlistTab watchlist={watch} onUpdate={saveWatch} apiKey={cfg.finnhubKey} onAddToJournal={openAddWithSym} onOpenChart={s=>setChart(s)}/>}
        {tab==="analytics" && <Analytics trades={trades}/>}
        {tab==="calendar"  && <CalendarTab trades={trades}/>}
        {tab==="journal"   && <JournalTab trades={trades} onChart={s=>setChart(s)} onReview={t=>setAiTrade(t)}/>}
        {tab==="playbook"  && <Playbook playbook={play} onSave={p=>savePlay([...play,p])} onDelete={deletePlay} onUse={p=>{setModal({_new:true,_template:p});}}/>}
        {tab==="weekly"    && <WeeklyReview trades={trades}/>}
        {tab==="tools"     && (
          <div style={{display:"flex",flexDirection:"column",gap:16}}>
            <Card style={{padding:20}}>
              <div style={{fontWeight:700,fontSize:15,color:G.text,marginBottom:16}}>🧮 Position Size Calculator</div>
              <RiskCalc initAccount={cfg.accountSize||5000}/>
            </Card>
          </div>
        )}
        {tab==="settings"  && <Settings cfg={cfg} onSave={saveCfg}/>}
      </div>

      {/* ── MODALS ── */}
      {modal&&(modal._new||modal.id)&&(
        <Modal title={modal.id?"Edit Trade":"Log New Trade"} onClose={()=>setModal(null)} maxW={780}>
          <TradeForm
            init={modal.id?modal:(modal._template?{symbol:modal.symbol||"",strategy:modal._template.strategy,side:modal._template.side,sector:modal._template.sector}:{symbol:modal.symbol||""})}
            onSave={addOrEdit}
            onClose={()=>setModal(null)}
            playbook={play}
          />
        </Modal>
      )}
      {modal==="csv"  && <Modal title="📥 Import from TradingView CSV" onClose={()=>setModal(null)} wide><CSVImport onImport={importAll} onClose={()=>setModal(null)}/></Modal>}
      {modal==="pine" && <Modal title="📌 Pine Script Export" onClose={()=>setModal(null)} wide><PineExport trades={trades} onClose={()=>setModal(null)}/></Modal>}
      {chart && <TVChart symbol={chart} onClose={()=>setChart(null)}/>}
      {aiTrade && <Modal title={`🤖 AI Trade Review — ${aiTrade.symbol}`} onClose={()=>setAiTrade(null)} maxW={640}><AIReview trade={aiTrade} onClose={()=>setAiTrade(null)}/></Modal>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
